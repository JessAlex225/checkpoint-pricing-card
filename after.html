<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartes tarifaires</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-bg: #f0f4f8;
      --color-surface: #ffffff;
      --color-text: #1a202c;
      --color-text-muted: #64748b;
      --color-accent: #2563eb;
      --color-accent-hover: #1d4ed8;
      --color-accent-light: #eff6ff;
      --color-success: #059669;
      --color-border: #e2e8f0;
      --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.08);
      --shadow-md: 0 4px 20px rgba(15, 23, 42, 0.1);
      --shadow-lg: 0 12px 40px rgba(15, 23, 42, 0.14);
      --radius: 16px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      line-height: 1.5;
    }

    .pricing-section {
      width: 100%;
      max-width: 1100px;
    }

    .pricing-section__header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeInDown 0.6s ease both;
    }

    .pricing-section__header h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .pricing-section__header p {
      margin-top: 0.5rem;
      color: var(--color-text-muted);
      font-size: 1rem;
    }

    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
      gap: 1.5rem;
      align-items: stretch;
    }

    .pricing-card {
      position: relative;
      display: flex;
      flex-direction: column;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 2rem 1.75rem;
      box-shadow: var(--shadow-sm);
      text-align: left;
      overflow: hidden;
      transition:
        transform var(--transition),
        box-shadow var(--transition),
        border-color var(--transition);
      animation: fadeInUp 0.6s ease both;
    }

    .pricing-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--color-accent), #7c3aed);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform var(--transition);
    }

    .pricing-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: transparent;
    }

    .pricing-card:hover::before {
      transform: scaleX(1);
    }

    .pricing-card:nth-child(1) { animation-delay: 0.05s; }
    .pricing-card:nth-child(2) { animation-delay: 0.15s; }
    .pricing-card:nth-child(3) { animation-delay: 0.25s; }

    .pricing-card--featured {
      border-color: var(--color-accent);
      box-shadow: var(--shadow-md);
    }

    .pricing-card--featured::before {
      transform: scaleX(1);
    }

    .pricing-card__badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--color-accent-light);
      color: var(--color-accent);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      letter-spacing: 0.02em;
    }

    .pricing-card__title {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 0.75rem;
    }

    .pricing-card__price {
      font-size: 2rem;
      font-weight: 800;
      color: var(--color-success);
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      line-height: 1.2;
    }

    .pricing-card__price span {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-text-muted);
    }

    .pricing-card__features {
      list-style: none;
      flex: 1;
      margin-bottom: 1.75rem;
    }

    .pricing-card__features li {
      position: relative;
      padding: 0.65rem 0 0.65rem 1.75rem;
      border-bottom: 1px solid var(--color-border);
      font-size: 0.9375rem;
      color: var(--color-text-muted);
      transition: color var(--transition);
    }

    .pricing-card__features li:last-child {
      border-bottom: none;
    }

    .pricing-card__features li::before {
      content: "✓";
      position: absolute;
      left: 0;
      top: 0.65rem;
      width: 1.25rem;
      height: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--color-success);
      background: #ecfdf5;
      border-radius: 50%;
    }

    .pricing-card:hover .pricing-card__features li {
      color: var(--color-text);
    }

    .pricing-card__btn {
      width: 100%;
      background: var(--color-accent);
      color: #fff;
      font-size: 0.9375rem;
      font-weight: 600;
      padding: 0.875rem 1.5rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition:
        background var(--transition),
        transform var(--transition),
        box-shadow var(--transition);
    }

    .pricing-card__btn:hover {
      background: var(--color-accent-hover);
      transform: scale(1.02);
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
    }

    .pricing-card__btn:active {
      transform: scale(0.98);
    }

    .pricing-card__btn:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 3px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 1.5rem 1rem;
      }

      .pricing-card {
        padding: 1.5rem 1.25rem;
      }

      .pricing-card__price {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>

  <section class="pricing-section" aria-label="Nos forfaits">
    <header class="pricing-section__header">
      <h1>Choisissez votre forfait</h1>
      <p>Des plans flexibles adaptés à vos besoins</p>
    </header>
    <div class="pricing-grid" id="pricing-grid"></div>
  </section>

  <script>
    /**
     * Crée une carte tarifaire réutilisable.
     * @param {string} title - Nom du forfait
     * @param {string} price - Prix affiché (ex. "9,99 $")
     * @param {string[]} features - Liste des fonctionnalités
     * @param {Object} [options] - Options supplémentaires
     * @param {string} [options.period="/mois"] - Période de facturation
     * @param {string} [options.buttonText="Démarrer l'essai"] - Texte du bouton
     * @param {boolean} [options.featured=false] - Mettre en avant la carte
     * @param {string} [options.badge=""] - Badge optionnel (ex. "Populaire")
     * @returns {HTMLElement} Élément article.pricing-card
     */
    function createPricingCard(title, price, features, options = {}) {
      const {
        period = "/mois",
        buttonText = "Démarrer l'essai",
        featured = false,
        badge = "",
      } = options;

      const card = document.createElement("article");
      card.className = "pricing-card" + (featured ? " pricing-card--featured" : "");

      if (badge) {
        const badgeEl = document.createElement("span");
        badgeEl.className = "pricing-card__badge";
        badgeEl.textContent = badge;
        card.appendChild(badgeEl);
      }

      const titleEl = document.createElement("h2");
      titleEl.className = "pricing-card__title";
      titleEl.textContent = title;

      const priceEl = document.createElement("p");
      priceEl.className = "pricing-card__price";
      priceEl.innerHTML = `${price} <span>${period}</span>`;

      const featuresList = document.createElement("ul");
      featuresList.className = "pricing-card__features";

      features.forEach(function (feature) {
        const item = document.createElement("li");
        item.textContent = feature;
        featuresList.appendChild(item);
      });

      const button = document.createElement("button");
      button.className = "pricing-card__btn";
      button.type = "button";
      button.textContent = buttonText;

      card.append(titleEl, priceEl, featuresList, button);
      return card;
    }

    const grid = document.getElementById("pricing-grid");

    grid.appendChild(
      createPricingCard("Forfait de base", "9,99 $", [
        "1 Go de stockage",
        "Assistance de base",
        "Toutes les fonctionnalités principales",
      ])
    );

    grid.appendChild(
      createPricingCard(
        "Forfait Pro",
        "19,99 $",
        [
          "10 Go de stockage",
          "Assistance prioritaire 24/7",
          "Toutes les fonctionnalités principales",
          "Intégrations avancées",
        ],
        { featured: true, badge: "Populaire" }
      )
    );

    grid.appendChild(
      createPricingCard("Forfait Entreprise", "49,99 $", [
        "Stockage illimité",
        "Gestionnaire de compte dédié",
        "SLA garanti 99,9 %",
        "SSO et audit de sécurité",
      ], { buttonText: "Contacter les ventes" })
    );
  </script>

</body>
</html>
